<ion-content [fullscreen]="true">
  <div class="form">
    <h3>Recuperação de Senha</h3>

    <ion-item>
      <!-- Adicionamos o ngModel -->
      <ion-input type="email" placeholder="Digite seu Email" [(ngModel)]="email"></ion-input>
    </ion-item>

    <!-- Trocamos o routerLink pelo (click) -->
    <ion-button (click)="enviarEmail()">Enviar E-mail</ion-button>

  </div>
</ion-content>
