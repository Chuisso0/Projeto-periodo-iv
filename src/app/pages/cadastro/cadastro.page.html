<ion-content [fullscreen]="true">

  <div class="form">

    <h3>Cadastrar</h3>
    <ion-item>

      <ion-input placeholder="Login"></ion-input>
    </ion-item>

    <ion-item>

      <ion-input type="email" placeholder="Email"></ion-input>
    </ion-item>

    <ion-item>

      <ion-input type="password" placeholder="Senha"></ion-input>
    </ion-item>

    <ion-item>

      <ion-input type="password" placeholder="Confirmar Senha"></ion-input>
    </ion-item>

    <ion-button routerLink="/login">Cadastrar</ion-button>

  </div>


</ion-content>
